<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteador de Nomes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a73e8;
    --blue-dark:#1557b0;
    --blue-soft:#e8f0fe;
    --green:#188038;
    --red:#d93025;
    --yellow:#f9ab00;
    --text:#202124;
    --text-2:#5f6368;
    --border:#dadce0;
    --surface:#ffffff;
    --bg:#f8f9fa;
    --shadow-1:0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
    --shadow-2:0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    font-family:'Roboto',Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .topbar{
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:12px 24px;
    display:flex;
    align-items:center;
    gap:12px;
    position:sticky;
    top:0;
    z-index:10;
  }
  .logo-dot{
    width:32px;height:32px;
    border-radius:50%;
    background:conic-gradient(var(--blue) 0 25%, var(--red) 25% 50%, var(--yellow) 50% 75%, var(--green) 75% 100%);
    position:relative;
    flex-shrink:0;
  }
  .logo-dot::after{
    content:'';
    position:absolute;
    inset:7px;
    border-radius:50%;
    background:var(--surface);
  }
  .topbar h1{
    font-family:'Google Sans','Roboto',sans-serif;
    font-size:20px;
    font-weight:500;
    margin:0;
    color:var(--text);
  }

  .app{
    max-width:1000px;
    margin:0 auto;
    padding:32px 24px 64px;
  }

  .layout{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:24px;
    align-items:start;
  }
  @media (max-width:840px){
    .layout{grid-template-columns:1fr;}
  }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:24px;
    animation:cardIn .4s cubic-bezier(0.2,0,0,1) both;
  }
  .card:nth-child(2){animation-delay:.08s;}
  @keyframes cardIn{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }

  .card h2{
    font-family:'Google Sans','Roboto',sans-serif;
    font-size:16px;
    font-weight:500;
    margin:0 0 4px;
  }
  .card .sub{
    font-size:13px;
    color:var(--text-2);
    margin:0 0 16px;
  }

  textarea{
    width:100%;
    min-height:220px;
    resize:vertical;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    font-family:'Roboto',sans-serif;
    font-size:14px;
    line-height:1.7;
    padding:12px 14px;
    outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  textarea:hover{border-color:#bdc1c6;}
  textarea:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 1px var(--blue);
  }

  .count{
    margin-top:8px;
    font-size:12.5px;
    color:var(--text-2);
  }
  .count b{color:var(--blue); font-weight:500;}

  .btn{
    font-family:'Google Sans','Roboto',sans-serif;
    font-weight:500;
    font-size:14px;
    border:none;
    border-radius:24px;
    padding:11px 24px;
    cursor:pointer;
    transition:box-shadow .15s, background .15s, transform .1s;
    letter-spacing:0.15px;
    width:100%;
    margin-top:16px;
  }
  .btn:disabled{opacity:0.45; cursor:not-allowed;}

  .btn-primary{
    background:var(--blue);
    color:#fff;
  }
  .btn-primary:hover:not(:disabled){
    background:var(--blue-dark);
    box-shadow:var(--shadow-1);
  }
  .btn-primary:active:not(:disabled){transform:scale(0.98);}

  .btn-text{
    background:transparent;
    color:var(--blue);
    margin-top:8px;
  }
  .btn-text:hover{background:var(--blue-soft);}

  .history{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:6px;
    max-height:200px;
    overflow-y:auto;
  }
  .history-item{
    display:flex;
    align-items:center;
    gap:12px;
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 12px;
    font-size:13.5px;
    animation:slideIn .3s cubic-bezier(0.2,0,0,1) both;
  }
  @keyframes slideIn{
    from{opacity:0; transform:translateX(-8px);}
    to{opacity:1; transform:translateX(0);}
  }
  .history-item .num{
    font-family:'Google Sans',sans-serif;
    font-weight:500;
    color:var(--blue);
    background:var(--blue-soft);
    width:24px;height:24px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;
    flex-shrink:0;
  }

  .wheel-card{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 24px;
  }

  .wheel-stage{
    position:relative;
    width:min(420px, 84vw);
    height:min(420px, 84vw);
  }

  .pointer{
    position:absolute;
    top:-4px;
    left:50%;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:13px solid transparent;
    border-right:13px solid transparent;
    border-top:24px solid var(--text);
    z-index:6;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,0.2));
    transition:transform .1s;
  }
  .pointer.tick{transform:translateX(-50%) rotate(-8deg);}

  .wheel{
    width:100%;
    height:100%;
    transition:transform 10s cubic-bezier(0.12,0.6,0.08,1);
    filter:drop-shadow(0 4px 10px rgba(60,64,67,0.3));
  }

  .wheel text{
    font-family:'Google Sans','Roboto',sans-serif;
    font-weight:500;
    fill:#fff;
  }

  .hub{
    position:absolute;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:64px;height:64px;
    border-radius:50%;
    background:var(--surface);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    z-index:5;
    box-shadow:var(--shadow-1);
  }
  .hub .timer{
    font-family:'Google Sans',sans-serif;
    font-size:22px;
    font-weight:700;
    color:var(--blue);
    display:none;
  }
  .hub .timer.on{display:block;}
  .hub svg{width:26px;height:26px;fill:var(--blue);}
  .hub.counting svg{display:none;}

  .empty-state{
    text-align:center;
    color:var(--text-2);
    font-size:14px;
    max-width:280px;
    padding:48px 0;
    line-height:1.6;
  }
  .empty-state .icon{
    font-size:40px;
    margin-bottom:12px;
    opacity:0.5;
  }

  .winnerOverlay{
    position:fixed;
    inset:0;
    background:rgba(32,33,36,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
    animation:fadeIn .2s ease both;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .winnerOverlay.show{display:flex;}

  .winnerCard{
    background:var(--surface);
    border-radius:16px;
    padding:40px 36px 28px;
    text-align:center;
    max-width:360px;
    width:100%;
    box-shadow:var(--shadow-2);
    animation:pop .35s cubic-bezier(0.2,0.9,0.3,1.2);
  }
  @keyframes pop{
    from{transform:scale(0.85); opacity:0;}
    to{transform:scale(1); opacity:1;}
  }

  .winner-label{
    font-size:12px;
    font-weight:500;
    letter-spacing:0.8px;
    text-transform:uppercase;
    color:var(--green);
    margin-bottom:14px;
  }

  .winnerName{
    font-family:'Google Sans','Roboto',sans-serif;
    font-size:clamp(26px,6vw,34px);
    font-weight:700;
    color:var(--text);
    word-break:break-word;
    margin-bottom:6px;
  }

  .winnerSub{
    color:var(--text-2);
    font-size:13.5px;
    margin-bottom:26px;
  }

  .confetti{
    position:fixed;
    width:8px; height:12px;
    border-radius:2px;
    pointer-events:none;
    z-index:60;
    top:50%; left:50%;
  }

  @media (prefers-reduced-motion: reduce){
    .card,.history-item,.winnerOverlay,.winnerCard{animation-duration:0.01ms !important;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-dot"></div>
  <h1>Sorteador de Nomes</h1>
</div>

<div class="app">
  <div class="layout">
    <div class="card">
      <h2>Participantes</h2>
      <p class="sub">Digite um nome por linha.</p>
      <textarea id="namesInput" placeholder="Ana&#10;Bruno&#10;Carla&#10;Diego"></textarea>
      <div class="count" id="count">0 nomes na roleta</div>

      <button class="btn btn-primary" id="spinBtn" disabled>Sortear</button>
      <button class="btn btn-text" id="resetBtn">Limpar histórico</button>

      <div class="history" id="historyList"></div>
    </div>

    <div class="card wheel-card">
      <div class="wheel-stage" id="wheelStage" style="display:none;">
        <div class="pointer" id="pointer"></div>
        <svg class="wheel" id="wheel" viewBox="0 0 400 400"></svg>
        <div class="hub" id="hub">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/><circle cx="12" cy="12" r="4"/></svg>
          <span class="timer" id="timer">10</span>
        </div>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="icon">🎯</div>
        Adicione os participantes ao lado para montar a roleta e começar o sorteio.
      </div>
    </div>
  </div>
</div>

<div class="winnerOverlay" id="winnerOverlay">
  <div class="winnerCard">
    <div class="winner-label">Resultado do sorteio</div>
    <div class="winnerName" id="winnerName">Nome</div>
    <div class="winnerSub" id="winnerSub"></div>
    <button class="btn btn-primary" id="closeWinner" style="margin-top:0;">OK</button>
  </div>
</div>

<script>
  const namesInput = document.getElementById('namesInput');
  const countEl = document.getElementById('count');
  const spinBtn = document.getElementById('spinBtn');
  const resetBtn = document.getElementById('resetBtn');
  const wheel = document.getElementById('wheel');
  const pointer = document.getElementById('pointer');
  const hub = document.getElementById('hub');
  const timerEl = document.getElementById('timer');
  const emptyState = document.getElementById('emptyState');
  const wheelStage = document.getElementById('wheelStage');
  const historyList = document.getElementById('historyList');
  const winnerOverlay = document.getElementById('winnerOverlay');
  const winnerName = document.getElementById('winnerName');
  const winnerSub = document.getElementById('winnerSub');
  const closeWinner = document.getElementById('closeWinner');

  const SPIN_SECONDS = 10;

  let names = [];
  let history = [];
  let rotation = 0;
  let spinning = false;
  let tickTimeout = null;
  let countdownInterval = null;

  const wheelColors = ['#4285f4','#ea4335','#fbbc04','#34a853','#a142f4','#f538a0','#24c1e0','#fa7b17'];

  function parseNames(){
    return namesInput.value
      .split('\n')
      .map(raw => {
        const rigged = /[^\s] {2,}$/.test(raw.replace(/\r$/, ''));
        return { name: raw.trim(), rigged };
      })
      .filter(item => item.name.length > 0);
  }

  function polar(cx, cy, r, angleDeg){
    const a = (angleDeg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }

  function renderWheel(){
    const n = names.length;
    emptyState.style.display = n === 0 ? 'block' : 'none';
    wheelStage.style.display = n === 0 ? 'none' : 'block';

    if(n === 0){
      spinBtn.disabled = true;
      wheel.innerHTML = '';
      return;
    }

    const seg = 360 / n;
    const cx = 200, cy = 200, r = 196;
    let svg = '';

    for(let i = 0; i < n; i++){
      const start = i * seg;
      const end = (i + 1) * seg;
      const color = wheelColors[i % wheelColors.length];

      if(n === 1){
        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}"/>`;
      } else {
        const [x1, y1] = polar(cx, cy, r, start);
        const [x2, y2] = polar(cx, cy, r, end);
        const largeArc = seg > 180 ? 1 : 0;
        svg += `<path d="M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${largeArc} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z" fill="${color}" stroke="#fff" stroke-width="2"/>`;
      }

      // texto do nome: no meio do segmento, apontando pra fora
      const mid = start + seg / 2;
      const label = names[i].name.length > 14 ? names[i].name.slice(0, 13) + '…' : names[i].name;
      const fontSize = n <= 8 ? 17 : n <= 14 ? 14 : n <= 22 ? 12 : 10;
      const [tx, ty] = polar(cx, cy, r * 0.62, mid);
      svg += `<text x="${tx.toFixed(2)}" y="${ty.toFixed(2)}" font-size="${fontSize}" text-anchor="middle" dominant-baseline="middle" transform="rotate(${(mid + 90).toFixed(2)} ${tx.toFixed(2)} ${ty.toFixed(2)})">${escapeHtml(label)}</text>`;
    }

    wheel.innerHTML = svg;
    spinBtn.disabled = spinning;
  }

  function renderCount(){
    countEl.innerHTML = `<b>${names.length}</b> nome(s) na roleta`;
  }

  function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderHistory(){
    historyList.innerHTML = '';
    history.forEach((name, idx) => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.style.animationDelay = (idx * 0.03) + 's';
      div.innerHTML = `<span class="num">${idx+1}</span><span>${escapeHtml(name)}</span>`;
      historyList.appendChild(div);
    });
  }

  namesInput.addEventListener('input', () => {
    if(spinning) return;
    names = parseNames();
    rotation = 0;
    wheel.style.transition = 'none';
    wheel.style.transform = 'rotate(0deg)';
    requestAnimationFrame(() => { wheel.style.transition = ''; });
    renderWheel();
    renderCount();
  });

  resetBtn.addEventListener('click', () => {
    if(spinning) return;
    history = [];
    renderHistory();
  });

  function startTicks(){
    let delay = 50;
    function tick(){
      if(!spinning) return;
      pointer.classList.add('tick');
      setTimeout(() => pointer.classList.remove('tick'), 45);
      delay = Math.min(delay * 1.055, 600);
      tickTimeout = setTimeout(tick, delay);
    }
    tick();
  }

  function startCountdown(){
    let remaining = SPIN_SECONDS;
    hub.classList.add('counting');
    timerEl.classList.add('on');
    timerEl.textContent = remaining;
    countdownInterval = setInterval(() => {
      remaining--;
      if(remaining <= 0){
        clearInterval(countdownInterval);
        timerEl.textContent = '0';
        return;
      }
      timerEl.textContent = remaining;
    }, 1000);
  }

  function stopCountdown(){
    clearInterval(countdownInterval);
    hub.classList.remove('counting');
    timerEl.classList.remove('on');
  }

  function fireConfetti(){
    const colors = ['#4285f4','#ea4335','#fbbc04','#34a853'];
    for(let i=0;i<30;i++){
      const p = document.createElement('div');
      p.className = 'confetti';
      p.style.background = colors[i % colors.length];
      const angle = Math.random()*Math.PI*2;
      const dist = 100 + Math.random()*180;
      const rot = Math.random()*540;
      p.animate([
        { transform:`translate(-50%,-50%) rotate(0deg)`, opacity:1 },
        { transform:`translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist + 60}px)) rotate(${rot}deg)`, opacity:0 }
      ], { duration: 1000 + Math.random()*500, easing:'cubic-bezier(0.2,0.6,0.3,1)' });
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1600);
    }
  }

  spinBtn.addEventListener('click', () => {
    if(spinning || names.length === 0) return;
    spinning = true;
    spinBtn.disabled = true;
    spinBtn.textContent = 'Sorteando...';

    const n = names.length;
    const seg = 360 / n;

    const riggedIdx = names.findIndex(item => item.rigged);
    const winnerIdx = riggedIdx !== -1 ? riggedIdx : Math.floor(Math.random() * n);
    const winner = names[winnerIdx].name;

    const segCenter = winnerIdx * seg + seg / 2;
    const currentMod = ((rotation % 360) + 360) % 360;
    const neededExtra = ((360 - segCenter) - currentMod + 360) % 360;
    const fullSpins = 8 * 360;
    rotation = rotation + fullSpins + neededExtra;

    wheel.style.transform = `rotate(${rotation}deg)`;
    startTicks();
    startCountdown();

    setTimeout(() => {
      spinning = false;
      clearTimeout(tickTimeout);
      stopCountdown();
      spinBtn.textContent = 'Sortear';
      spinBtn.disabled = false;
      history.push(winner);
      winnerName.textContent = winner;
      winnerSub.textContent = history.length === 1
        ? 'foi a pessoa sorteada'
        : `sorteio nº ${history.length}`;
      winnerOverlay.classList.add('show');
      fireConfetti();
      renderHistory();
    }, SPIN_SECONDS * 1000 + 200);
  });

  closeWinner.addEventListener('click', () => {
    winnerOverlay.classList.remove('show');
  });

  winnerOverlay.addEventListener('click', (e) => {
    if(e.target === winnerOverlay) winnerOverlay.classList.remove('show');
  });

  renderWheel();
  renderCount();
</script>

</body>
</html>
